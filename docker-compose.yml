services:
  mongodb:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    volumes:
      - illustry_mongo:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootPass
      MONGO_INITDB_DATABASE: illustry
    ports:
      - "27017:27017"
    networks:
      - illustry-network

  illustrybackend:
    build:
      context: ./  # Build context for backend
      dockerfile: backend/Dockerfile  # Optional, default is Dockerfile
    container_name: illustrybackend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017/illustry
      MONGO_USER: root
      MONGO_PASSWORD: rootPass
      ILLUSTRY_PORT: 7001
      AUTH_APP_BASE_URL: http://localhost:3000
      EMAIL_SERVICE_URL: http://illustryemailservice:7100
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-illustry-email-service-local-key}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:7001/api/auth/google/callback}
      GOOGLE_OAUTH_SCOPE: ${GOOGLE_OAUTH_SCOPE:-openid email profile}
    ports:
      - "7001:7001"
    networks:
      - illustry-network

  illustryfrontend:
    build:
      context: ./  # Build context for frontend
      dockerfile: frontend/Dockerfile  # Optional, default is Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://illustrybackend:7001
        NEXT_PUBLIC_BACKEND_PUBLIC_URL: http://localhost:7001
        NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
    container_name: illustryfrontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://illustrybackend:7001
      NEXT_PUBLIC_BACKEND_PUBLIC_URL: http://localhost:7001
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}

    ports:
      - "3000:3000"
    networks:
      - illustry-network

  illustryemailservice:
    build:
      context: ./
      dockerfile: services/email-service/Dockerfile
    container_name: illustryemailservice
    restart: unless-stopped
    environment:
      EMAIL_SERVICE_PORT: 7100
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-illustry-email-service-local-key}
      AUTH_APP_BASE_URL: http://localhost:3000
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@illustry.local}
    ports:
      - "7100:7100"
    networks:
      - illustry-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: illustrymailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - illustry-network

