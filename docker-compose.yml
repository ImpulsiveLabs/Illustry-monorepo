services:
  mongodb:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    profiles:
      - local-mongo
    volumes:
      - illustry_mongo:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootPass
      MONGO_INITDB_DATABASE: illustry
    ports:
      - "27017:27017"
    networks:
      - illustry-network

  redis:
    image: redis:7-alpine
    container_name: illustryredis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - illustry_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - illustry-network

  illustrybackend:
    build:
      context: ./  # Build context for backend
      dockerfile: backend/Dockerfile  # Optional, default is Dockerfile
    container_name: illustrybackend
    restart: unless-stopped
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/}
      MONGO_USER: ${MONGO_USER-}
      MONGO_PASSWORD: ${MONGO_PASSWORD-}
      ILLUSTRY_PORT: 7001
      AUTH_APP_BASE_URL: ${AUTH_APP_BASE_URL:-http://localhost:3000}
      AUTH_EMAIL_VERIFICATION_TTL_MINUTES: ${AUTH_EMAIL_VERIFICATION_TTL_MINUTES:-15}
      CORS_ORIGIN_ALLOWLIST: ${CORS_ORIGIN_ALLOWLIST:-http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://localhost:4321,http://127.0.0.1:4321,http://0.0.0.0:4321}
      EMAIL_SERVICE_URL: http://illustryemailservice:7100
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-illustry-email-service-local-key}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:7001/api/auth/google/callback}
      GOOGLE_OAUTH_SCOPE: ${GOOGLE_OAUTH_SCOPE:-openid email profile}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_REALTIME_CHANNEL: ${REDIS_REALTIME_CHANNEL:-illustry:realtime}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "7001:7001"
    networks:
      - illustry-network

  illustryfrontend:
    build:
      context: ./  # Build context for frontend
      dockerfile: frontend/Dockerfile  # Optional, default is Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://illustrybackend:7001
        NEXT_PUBLIC_BACKEND_PUBLIC_URL: ${NEXT_PUBLIC_BACKEND_PUBLIC_URL:-http://localhost:7001}
        NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
    container_name: illustryfrontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://illustrybackend:7001
      NEXT_PUBLIC_BACKEND_PUBLIC_URL: ${NEXT_PUBLIC_BACKEND_PUBLIC_URL:-http://localhost:7001}
      NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}

    ports:
      - "3000:3000"
    networks:
      - illustry-network

  illustryemailservice:
    build:
      context: ./
      dockerfile: services/email-service/Dockerfile
    container_name: illustryemailservice
    restart: unless-stopped
    environment:
      EMAIL_SERVICE_PORT: 7100
      EMAIL_SERVICE_API_KEY: ${EMAIL_SERVICE_API_KEY:-illustry-email-service-local-key}
      AUTH_APP_BASE_URL: ${AUTH_APP_BASE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_TEST_EMAIL: ${RESEND_TEST_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-Illustry <onboarding@resend.dev>}
    ports:
      - "7100:7100"
    networks:
      - illustry-network

  illustrycli:
    build:
      context: ./
      dockerfile: packages/Dockerfile
    container_name: illustrycli
    profiles:
      - tools
    working_dir: /workspace
    entrypoint: ["node", "/illustry/packages/cli/dist/index.js"]
    command: ["--help"]
    environment:
      ILLUSTRY_SERVER_URL: ${ILLUSTRY_SERVER_URL:-http://illustrybackend:7001}
    volumes:
      - illustry_cli_workspace:/workspace/.illustry
      - ./exports:/workspace/exports
      - ./:/workspace/repo:ro
    networks:
      - illustry-network

  illustrymcp:
    build:
      context: ./
      dockerfile: packages/Dockerfile
    container_name: illustrymcp
    profiles:
      - tools
    working_dir: /workspace
    entrypoint: ["node", "/illustry/packages/mcp/dist/index.js"]
    stdin_open: true
    tty: false
    environment:
      ILLUSTRY_SERVER_URL: ${ILLUSTRY_SERVER_URL:-http://illustrybackend:7001}
    volumes:
      - illustry_mcp_workspace:/workspace/.illustry
      - ./exports:/workspace/exports
      - ./:/workspace/repo:ro
    networks:
      - illustry-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: illustrymailpit
    restart: unless-stopped
    profiles:
      - mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - illustry-network

