name: Lerna Monorepo Build and Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: 22
  MONGO_TEST_URL: mongodb://127.0.0.1:27017/illustrytest
  MONGO_USER: root
  MONGO_PASSWORD: rootPass

jobs:
  build_and_lint:
    name: Build and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build TypeScript
        run: yarn build:ts

      - name: Run lint
        run: yarn lint

  backend_unit:
    name: Backend unit shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      mongodb:
        image: mongo:4.4.6
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootPass
          MONGO_INITDB_DATABASE: illustrytest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mongosh
        run: |
          sudo apt-get install gnupg
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-7.0.asc
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize MongoDB
        run: |
          mongosh --host localhost:27017 -u "root" -p "rootPass" --authenticationDatabase admin <<EOF
          db = db.getSiblingDB('illustrytest');
          db.createUser({ user: "root" , pwd: "rootPass", roles: [{ role: 'readWrite', db: 'illustrytest' }] });
          db.createCollection('dashboards');
          db.createCollection('visualizations');
          db.createCollection('projects');
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run backend unit shard
        run: yarn test:backend:shard
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4

  frontend_unit:
    name: Frontend unit shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run frontend unit shard
        run: yarn test:frontend:shard
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4

  support_unit:
    name: Support package tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - script: test:types:shard
            shard: 1
            total: 1
          - script: test:email:shard
            shard: 1
            total: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run support package tests
        run: yarn ${{ matrix.package.script }}
        env:
          SHARD_INDEX: ${{ matrix.package.shard }}
          SHARD_TOTAL: ${{ matrix.package.total }}

  api_e2e:
    name: API E2E
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:4.4.6
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootPass
          MONGO_INITDB_DATABASE: illustrytest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mongosh
        run: |
          sudo apt-get install gnupg
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-7.0.asc
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize MongoDB
        run: |
          mongosh --host localhost:27017 -u "root" -p "rootPass" --authenticationDatabase admin <<EOF
          db = db.getSiblingDB('illustrytest');
          db.createUser({ user: "root" , pwd: "rootPass", roles: [{ role: 'readWrite', db: 'illustrytest' }] });
          db.createCollection('dashboards');
          db.createCollection('visualizations');
          db.createCollection('projects');
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run API E2E
        run: yarn e2e:api:shard
        env:
          SHARD_INDEX: 1
          SHARD_TOTAL: 1

  frontend_e2e:
    name: Frontend E2E shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      mongodb:
        image: mongo:4.4.6
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootPass
          MONGO_INITDB_DATABASE: illustrytest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mongosh
        run: |
          sudo apt-get install gnupg
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-7.0.asc
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize MongoDB
        run: |
          mongosh --host localhost:27017 -u "root" -p "rootPass" --authenticationDatabase admin <<EOF
          db = db.getSiblingDB('illustrytest');
          db.createUser({ user: "root" , pwd: "rootPass", roles: [{ role: 'readWrite', db: 'illustrytest' }] });
          db.createCollection('dashboards');
          db.createCollection('visualizations');
          db.createCollection('projects');
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @impulsivelabs/illustry-client playwright install --with-deps chromium

      - name: Run frontend E2E shard
        run: CI=1 yarn e2e:shard
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4

  frontend_e2e_coverage:
    name: Frontend E2E coverage shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      mongodb:
        image: mongo:4.4.6
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: rootPass
          MONGO_INITDB_DATABASE: illustrytest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install mongosh
        run: |
          sudo apt-get install gnupg
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-7.0.asc
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize MongoDB
        run: |
          mongosh --host localhost:27017 -u "root" -p "rootPass" --authenticationDatabase admin <<EOF
          db = db.getSiblingDB('illustrytest');
          db.createUser({ user: "root" , pwd: "rootPass", roles: [{ role: 'readWrite', db: 'illustrytest' }] });
          db.createCollection('dashboards');
          db.createCollection('visualizations');
          db.createCollection('projects');
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace @impulsivelabs/illustry-client playwright install --with-deps chromium

      - name: Run frontend E2E coverage shard
        run: CI=1 yarn e2e:coverage:shard
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: 4

      - name: Upload E2E coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-${{ matrix.shard }}
          path: frontend/.nyc_output
          if-no-files-found: error

  frontend_e2e_coverage_check:
    name: Frontend E2E coverage check
    runs-on: ubuntu-latest
    needs: frontend_e2e_coverage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download E2E coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-coverage-*
          path: frontend/.nyc_output
          merge-multiple: true

      - name: Report E2E coverage
        run: yarn e2e:coverage:report

      - name: Check E2E coverage thresholds
        run: yarn e2e:coverage:check:only
