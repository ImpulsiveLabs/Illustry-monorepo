name: Lerna Monorepo Build and Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write
  
jobs:
  build_and_test:
    name: Build and Test Monorepo
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:4.4.6
        env:
          MONGO_INITDB_ROOT_USERNAME: "root"
          MONGO_INITDB_ROOT_PASSWORD: "rootPass"
          MONGO_INITDB_DATABASE: illustrytest
        ports:
          - 27017:27017
        options: >-
          --health-cmd mongo
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: Install mongosh
        run: |
          sudo apt-get install gnupg
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo tee /etc/apt/trusted.gpg.d/server-7.0.asc
          echo "deb [ arch=amd64,arm64 ] https://repo.mongodb.org/apt/ubuntu focal/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-mongosh
          mongosh --version

      - name: Initialize MongoDB
        run: |
              mongosh --host localhost:27017 -u "root" -p "rootPass" --authenticationDatabase admin <<EOF
              db = db.getSiblingDB('illustrytest');
              db.createUser({ user: "root" , pwd: "rootPass", roles: [{ role: 'readWrite', db: 'illustrytest' }] });
              db.createCollection('dashboards');
              db.createCollection('visualizations');
              db.createCollection('projects');
              EOF

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: yarn install

      - name: Build TypeScript
        run: yarn build:ts

      - name: Run Tests
        run: yarn test

      - name: Install Playwright Browsers
        run: yarn workspace @impulsivelabs/illustry-client playwright install --with-deps chromium

      - name: Run Frontend E2E Main Flows
        run: CI=1 yarn e2e

      - name: Run Frontend E2E Coverage Check
        run: CI=1 yarn workspace @impulsivelabs/illustry-client e2e:coverage:check
