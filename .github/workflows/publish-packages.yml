name: Publish Illustry Packages

on:
  push:
    branches:
      - main
    paths:
      - types/**
      - packages/core/**
      - packages/cli/**
      - package.json
      - yarn.lock
      - scripts/release-packages.mjs
      - .github/workflows/publish-packages.yml
  workflow_dispatch:
    inputs:
      registry:
        description: Registry target
        required: true
        default: npm
        type: choice
        options:
          - npm
          - github
          - both
      package:
        description: Package set to release
        required: true
        default: all
        type: choice
        options:
          - types
          - core
          - cli
          - all
      version_bump:
        description: Version bump
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  NODE_VERSION: 22

jobs:
  publish:
    name: Release Illustry packages
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js for install
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Prepare release
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ inputs.package }}
          MANUAL_BUMP: ${{ inputs.version_bump }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          package_set="${MANUAL_PACKAGE:-auto}"
          version_bump="${MANUAL_BUMP:-none}"
          node scripts/release-packages.mjs \
            --event "${EVENT_NAME}" \
            --package "${package_set}" \
            --bump "${version_bump}" \
            --before "${BEFORE_SHA}" \
            --after "${AFTER_SHA}"

      - name: Show release plan
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: |
          echo "Packages: ${{ steps.release.outputs.package_names }}"
          echo "Versions: ${{ steps.release.outputs.versions }}"

      - name: Install dependencies
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

      - name: Audit every package
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: yarn audit

      - name: Build shared types
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: yarn workspace @illustry/types build:ts

      - name: Lint core package
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: yarn workspace @illustry/core lint

      - name: Build shared core
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: yarn workspace @illustry/core build:ts

      - name: Lint CLI package
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: yarn workspace @illustry/cli lint

      - name: Test publish packages
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: |
          yarn workspace @illustry/core test --runInBand
          yarn workspace @illustry/cli test --runInBand

      - name: Build publish packages
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        run: |
          yarn workspace @illustry/types build:ts
          yarn workspace @illustry/core build:ts
          yarn workspace @illustry/cli build:ts

      - name: Verify package payloads
        if: ${{ steps.release.outputs.has_changes == 'true' }}
        env:
          PACKAGES: ${{ steps.release.outputs.package_dirs }}
        run: |
          for package_dir in ${PACKAGES}; do
            npm pack "./${package_dir}" --dry-run
          done

      - name: Commit version bump
        id: version_bump
        if: ${{ steps.release.outputs.has_changes == 'true' && inputs.dry_run != true && inputs.version_bump != 'none' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/release-packages.mjs \
            --commit-only \
            --commit-message "chore(release): bump Illustry packages [skip ci]"
          if git push origin HEAD:main; then
            echo "opened_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch="release/illustry-packages-${{ github.run_id }}"
          git switch -c "${branch}"
          git push --set-upstream origin "${branch}"
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore(release): bump Illustry packages" \
            --body "Automated package version bump from workflow run ${{ github.run_id }}."
          echo "opened_pr=true" >> "$GITHUB_OUTPUT"

      - name: Stop after opening version bump PR
        if: ${{ steps.version_bump.outputs.opened_pr == 'true' }}
        run: |
          echo "Opened a version bump PR. Publish will run after the PR is merged to main."

      - name: Resolve publish target
        id: publish_target
        if: ${{ steps.release.outputs.has_changes == 'true' && steps.version_bump.outputs.opened_pr != 'true' }}
        shell: bash
        env:
          MANUAL_REGISTRY: ${{ inputs.registry }}
          MANUAL_DRY_RUN: ${{ inputs.dry_run }}
          AUTO_REGISTRY: ${{ vars.ILLUSTRY_AUTO_REGISTRY }}
        run: |
          registry="${MANUAL_REGISTRY:-${AUTO_REGISTRY:-npm}}"
          dry_run="${MANUAL_DRY_RUN:-false}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: ${{ steps.release.outputs.has_changes == 'true' && (steps.publish_target.outputs.registry == 'npm' || steps.publish_target.outputs.registry == 'both') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DRY_RUN: ${{ steps.publish_target.outputs.dry_run }}
          PACKAGES: ${{ steps.release.outputs.package_dirs }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required to publish to npm."
            exit 1
          fi
          printf "//registry.npmjs.org/:_authToken=%s\n" "${NODE_AUTH_TOKEN}" > ~/.npmrc
          for package_dir in ${PACKAGES}; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; it already exists on npm."
              continue
            fi
            echo "Publishing ${package_name}@${package_version} to npm"
            if [ "${DRY_RUN}" = "true" ]; then
              npm publish "./${package_dir}" --access public --dry-run
            else
              if ! npm publish "./${package_dir}" --access public 2>npm-publish-error.log; then
                if grep -q "npm error 404" npm-publish-error.log; then
                  cat npm-publish-error.log
                  echo "Skipping ${package_name}@${package_version}; npm rejected package creation. Check NPM_TOKEN access to the package scope."
                  continue
                fi
                cat npm-publish-error.log
                exit 1
              fi
            fi
          done

      - name: Verify npm package imports
        if: ${{ steps.release.outputs.has_changes == 'true' && (steps.publish_target.outputs.registry == 'npm' || steps.publish_target.outputs.registry == 'both') && steps.publish_target.outputs.dry_run != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGES: ${{ steps.release.outputs.package_dirs }}
        shell: bash
        run: |
          tmp_dir="$(mktemp -d)"
          cd "${tmp_dir}"
          npm init -y >/dev/null
          printf "//registry.npmjs.org/:_authToken=%s\n" "${NODE_AUTH_TOKEN}" > .npmrc
          for package_dir in ${PACKAGES}; do
            package_name="$(node -p "require('${GITHUB_WORKSPACE}/${package_dir}/package.json').name")"
            package_version="$(node -p "require('${GITHUB_WORKSPACE}/${package_dir}/package.json').version")"
            if ! npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping npm import verification for ${package_name}@${package_version}; it is not published on npm."
              continue
            fi
            npm install "${package_name}@${package_version}"
            node -e "require('${package_name}')"
          done

      - name: Publish to GitHub Packages
        if: ${{ steps.release.outputs.has_changes == 'true' && (steps.publish_target.outputs.registry == 'github' || steps.publish_target.outputs.registry == 'both') }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ steps.publish_target.outputs.dry_run }}
          PACKAGES: ${{ steps.release.outputs.package_dirs }}
        shell: bash
        run: |
          node scripts/prepare-github-packages.mjs
          printf "@impulsivelabs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "${NODE_AUTH_TOKEN}" > ~/.npmrc
          for package_dir in ${PACKAGES}; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version --registry https://npm.pkg.github.com >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version}; it already exists on GitHub Packages."
              continue
            fi
            echo "Publishing ${package_name}@${package_version} to GitHub Packages"
            if [ "${DRY_RUN}" = "true" ]; then
              npm publish "./${package_dir}" --registry https://npm.pkg.github.com --dry-run
            else
              npm publish "./${package_dir}" --registry https://npm.pkg.github.com
            fi
          done

      - name: Verify GitHub package imports
        if: ${{ steps.release.outputs.has_changes == 'true' && (steps.publish_target.outputs.registry == 'github' || steps.publish_target.outputs.registry == 'both') && steps.publish_target.outputs.dry_run != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ steps.release.outputs.package_dirs }}
        shell: bash
        run: |
          tmp_dir="$(mktemp -d)"
          cd "${tmp_dir}"
          npm init -y >/dev/null
          printf "@impulsivelabs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "${NODE_AUTH_TOKEN}" > .npmrc
          for package_dir in ${PACKAGES}; do
            package_name="$(node -p "require('${GITHUB_WORKSPACE}/${package_dir}/package.json').name")"
            package_version="$(node -p "require('${GITHUB_WORKSPACE}/${package_dir}/package.json').version")"
            npm install "${package_name}@${package_version}" --registry https://npm.pkg.github.com
            node -e "require('${package_name}')"
          done
