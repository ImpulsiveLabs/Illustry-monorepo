version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
          - "@next/*"
      test-tooling:
        dependency-type: development
        patterns:
          - "@playwright/*"
          - "@testing-library/*"
          - vitest
          - "@vitest/*"
          - jest
          - ts-jest
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
